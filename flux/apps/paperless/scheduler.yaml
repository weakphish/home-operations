apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-scheduler
  namespace: default
  labels:
    app: paperless-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-scheduler
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: paperless-scheduler
    spec:
      volumes:
        - name: paperless-data
          persistentVolumeClaim: { claimName: paperless-data-claim }
        - name: paperless-scratch
          emptyDir: {}
        - name: paperless-tmp
          emptyDir: {}
      containers:
        - name: paperless-scheduler
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          command: ["celery", "--app", "paperless", "beat", "--loglevel", "INFO"]
          env:
            - { name: PAPERLESS_REDIS, value: "redis://paperless-redis:6379" }
            - { name: PAPERLESS_DBHOST, value: paperless-postgres }
            - { name: PAPERLESS_DBNAME, value: paperless }
            - { name: PAPERLESS_DBUSER, value: paperless }
            - name: PAPERLESS_DBPASS
              valueFrom: { secretKeyRef: { name: paperless-secret, key: dbPassword } }
            - name: PAPERLESS_SECRET_KEY
              valueFrom: { secretKeyRef: { name: paperless-secret, key: secretKey } }
            - { name: PAPERLESS_TIME_ZONE, value: "America/New_York" }
            - { name: USERMAP_UID, value: "1000" }
            - { name: USERMAP_GID, value: "1000" }
          volumeMounts:
            - { name: paperless-data,    mountPath: /usr/src/paperless/data }
            - { name: paperless-scratch, mountPath: /var/tmp/paperless-scratch }
            - { name: paperless-tmp,     mountPath: /var/tmp/paperless }
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
          livenessProbe:
            exec:
              command: [/bin/sh, -c, "pgrep -f 'celery.*beat'"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
