apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-web
  namespace: default
  labels:
    app: paperless-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: paperless-web
    spec:
      enableServiceLinks: false
      volumes:
        - name: paperless-data
          persistentVolumeClaim: { claimName: paperless-data-claim }
        - name: paperless-media
          persistentVolumeClaim: { claimName: paperless-media-claim }
        - name: paperless-consume
          persistentVolumeClaim: { claimName: paperless-consume-claim }
        - name: paperless-scratch
          emptyDir: {}
        - name: paperless-tmp
          emptyDir: {}
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          ports:
            - containerPort: 8000
          env:
            - { name: PAPERLESS_REDIS, value: "redis://paperless-redis:6379" }
            - { name: PAPERLESS_DBHOST, value: paperless-postgres }
            - { name: PAPERLESS_DBNAME, value: paperless }
            - { name: PAPERLESS_DBUSER, value: paperless }
            - name: PAPERLESS_DBPASS
              valueFrom: { secretKeyRef: { name: paperless-secret, key: dbPassword } }
            - name: PAPERLESS_SECRET_KEY
              valueFrom: { secretKeyRef: { name: paperless-secret, key: secretKey } }
            - name: PAPERLESS_ADMIN_USER
              valueFrom: { secretKeyRef: { name: paperless-secret, key: adminUser } }
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: paperless-secret, key: adminPassword } }
            - name: PAPERLESS_ADMIN_MAIL
              valueFrom: { secretKeyRef: { name: paperless-secret, key: adminEmail } }
            - { name: PAPERLESS_URL, value: "https://paperless.pipefish-manta.ts.net" }
            - { name: PAPERLESS_ALLOWED_HOSTS, value: "paperless.pipefish-manta.ts.net,localhost,127.0.0.1" }
            - { name: PAPERLESS_CSRF_TRUSTED_ORIGINS, value: "https://paperless.pipefish-manta.ts.net" }
            - { name: PAPERLESS_TIME_ZONE, value: "America/New_York" }
            - { name: PAPERLESS_OCR_LANGUAGE, value: "eng" }
            - { name: USERMAP_UID, value: "1000" }
            - { name: USERMAP_GID, value: "1000" }
            - { name: PAPERLESS_CONVERT_TMPDIR, value: /var/tmp/paperless }
            - { name: PAPERLESS_SCRATCH_DIR, value: /var/tmp/paperless-scratch }
          volumeMounts:
            - { name: paperless-data,    mountPath: /usr/src/paperless/data }
            - { name: paperless-media,   mountPath: /usr/src/paperless/media }
            - { name: paperless-consume, mountPath: /usr/src/paperless/consume }
            - { name: paperless-scratch, mountPath: /var/tmp/paperless-scratch }
            - { name: paperless-tmp,     mountPath: /var/tmp/paperless }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 2Gi }
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
