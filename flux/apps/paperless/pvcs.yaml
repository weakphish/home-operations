apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data-claim
  namespace: default
spec:
  storageClassName: manual
  accessModes: [ReadWriteOnce]
  selector: { matchLabels: { app: paperless, volume: data } }
  resources: { requests: { storage: 10Gi } }
---
