apiVersion: v1
kind: PersistentVolume
metadata:
  name: satisfactory-data
  labels:
    type: local
spec:
  storageClassName: manual
  capacity: { storage: 30Gi }
  hostPath: { path: /home/jack/Applications/satisfactory }
  persistentVolumeReclaimPolicy: Retain
  accessModes: [ReadWriteOnce]
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [infinite-granite]
