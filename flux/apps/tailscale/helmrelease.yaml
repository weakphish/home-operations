apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  values:
    oauth:
      clientId:
        secretKeyRef:
          name: tailscale-oauth
          key: clientId
      clientSecret:
        secretKeyRef:
          name: tailscale-oauth
          key: clientSecret
