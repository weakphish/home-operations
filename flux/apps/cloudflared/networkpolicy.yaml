apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Cloudflare edge (HTTPS + QUIC)
    - ports:
        - port: 443
          protocol: TCP
        - port: 7844
          protocol: TCP
        - port: 7844
          protocol: UDP
    # Foundry service
    - ports:
        - port: 30000
          protocol: TCP
