apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: homelab
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 4
      Personal:
        style: row
        columns: 2
      Gaming:
        style: row
        columns: 2

  services.yaml: |
    - Infrastructure:
        - Grafana:
            href: https://grafana.pipefish-manta.ts.net
            description: Monitoring & Dashboards
            icon: grafana
        - Longhorn:
            href: https://longhorn.pipefish-manta.ts.net
            description: Block Storage
            icon: longhorn
        - Prometheus:
            description: Metrics (internal)
            icon: prometheus
        - Loki:
            description: Log aggregation (internal)
            icon: loki

    - Personal:
        - Paperless:
            href: https://paperless.pipefish-manta.ts.net
            description: Document management
            icon: paperless-ngx
        - Donetick:
            href: https://donetick.pipefish-manta.ts.net
            description: Chores & tasks
            icon: donetick

    - Gaming:
        - Foundry VTT:
            href: https://foundry.pipefish-manta.ts.net
            description: D&D Virtual Tabletop
            icon: foundry-vtt
        - Satisfactory:
            description: Factory game server (UDP)
            icon: satisfactory

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: new-bermuda
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - datetime:
        text_size: l
        format:
          timeStyle: short
          dateStyle: short

  bookmarks.yaml: |

  custom.css: ""
  custom.js: ""
