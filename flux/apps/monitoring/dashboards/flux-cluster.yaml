apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-flux-cluster
  namespace: default
  labels:
    grafana_dashboard: "1"
data:
  flux-cluster.json: |
    {
      "uid": "flux-cluster",
      "title": "Flux Cluster Stats",
      "tags": [
        "flux"
      ],
      "schemaVersion": 38,
      "refresh": "30s",
      "timezone": "browser",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "label": "Datasource",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "refresh": 1
          },
          {
            "name": "operator_namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(gotk_reconcile_duration_seconds_sum, namespace)",
              "refId": "StandardVariableQuery"
            },
            "definition": "label_values(gotk_reconcile_duration_seconds_sum, namespace)",
            "label": "Operator Namespace",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "refresh": 2,
            "sort": 5,
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            }
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "Overview",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Kustomizations",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "count(count by (name) (gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\", kind=\"Kustomization\"}))",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "HelmReleases",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "count(count by (name) (gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\", kind=\"HelmRelease\"}))",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Git/Helm Sources",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "count(count by (name) (gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\", kind=~\"GitRepository|HelmRepository|HelmChart|OCIRepository|Bucket\"}))",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Reconcile Ops/min",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}[5m])) * 60",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          }
        },
        {
          "id": 101,
          "type": "row",
          "title": "Reconciliation Activity",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Reconciliation Rate by Kind",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}[5m])) by (kind)",
              "legendFormat": "{{kind}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 5
              }
            }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Avg Reconciliation Duration by Kind",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(gotk_reconcile_duration_seconds_sum{namespace=~\"$operator_namespace\"}[5m])) by (kind)\n/ sum(rate(gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}[5m])) by (kind)",
              "legendFormat": "{{kind}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 5
              }
            }
          }
        },
        {
          "id": 102,
          "type": "row",
          "title": "Resource Detail",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          }
        },
        {
          "id": 9,
          "type": "piechart",
          "title": "Resources by Kind",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "count by (kind) (count by (kind, name) (gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}))",
              "instant": true,
              "legendFormat": "{{kind}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 8,
            "x": 0,
            "y": 15
          },
          "options": {
            "pieType": "pie",
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": [
                "value",
                "percent"
              ]
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          }
        },
        {
          "id": 7,
          "type": "table",
          "title": "Reconciliation Stats per Resource",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum by (kind, name, exported_namespace) (gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"})",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(gotk_reconcile_duration_seconds_sum{namespace=~\"$operator_namespace\"}[5m])) by (kind, name, exported_namespace)\n/ sum(rate(gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}[5m])) by (kind, name, exported_namespace)",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 16,
            "x": 8,
            "y": 15
          },
          "options": {
            "sortBy": [
              {
                "displayName": "Reconciliations",
                "desc": true
              }
            ]
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Avg Duration"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "s"
                  },
                  {
                    "id": "decimals",
                    "value": 3
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Time"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "pod": true,
                  "namespace": true,
                  "__name__": true
                },
                "renameByName": {
                  "kind": "Kind",
                  "name": "Name",
                  "exported_namespace": "Namespace",
                  "Value #A": "Reconciliations",
                  "Value #B": "Avg Duration",
                  "Value": "Reconciliations"
                }
              }
            }
          ]
        },
        {
          "id": 103,
          "type": "row",
          "title": "Duration Percentiles",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 25
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Reconciliation Duration p50/p95/p99",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "histogram_quantile(0.50, sum(rate(gotk_reconcile_duration_seconds_bucket{namespace=~\"$operator_namespace\"}[5m])) by (le, kind))",
              "legendFormat": "p50 {{kind}}",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "histogram_quantile(0.95, sum(rate(gotk_reconcile_duration_seconds_bucket{namespace=~\"$operator_namespace\"}[5m])) by (le, kind))",
              "legendFormat": "p95 {{kind}}",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "histogram_quantile(0.99, sum(rate(gotk_reconcile_duration_seconds_bucket{namespace=~\"$operator_namespace\"}[5m])) by (le, kind))",
              "legendFormat": "p99 {{kind}}",
              "refId": "C"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 26
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 5
              }
            }
          }
        },
        {
          "id": 104,
          "type": "row",
          "title": "Stats by Kind",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 34
          }
        },
        {
          "id": 10,
          "type": "table",
          "title": "Resource Stats by Kind",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "count by (kind) (count by (kind, name) (gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}))",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum by (kind) (rate(gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}[5m])) * 60",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum by (kind) (rate(gotk_reconcile_duration_seconds_sum{namespace=~\"$operator_namespace\"}[5m]))\n/ sum by (kind) (rate(gotk_reconcile_duration_seconds_count{namespace=~\"$operator_namespace\"}[5m]))",
              "instant": true,
              "legendFormat": "",
              "refId": "C"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 35
          },
          "options": {
            "sortBy": [
              {
                "displayName": "Kind",
                "desc": false
              }
            ]
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Reconcile Rate (ops/min)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "ops"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Avg Duration"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "s"
                  },
                  {
                    "id": "decimals",
                    "value": 3
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Time"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "renameByName": {
                  "kind": "Kind",
                  "Value #A": "Resources",
                  "Value #B": "Reconcile Rate (ops/min)",
                  "Value #C": "Avg Duration"
                }
              }
            }
          ]
        }
      ]
    }
