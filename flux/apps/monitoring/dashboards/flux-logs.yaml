apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-flux-logs
  namespace: default
  labels:
    grafana_dashboard: "1"
data:
  flux-logs.json: |
    {
      "uid": "flux-logs",
      "title": "Flux Logs",
      "description": "Flux logs collected from Kubernetes, stored in Loki",
      "tags": [
        "flux"
      ],
      "schemaVersion": 38,
      "refresh": "30s",
      "timezone": "browser",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "label": "Datasource",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "refresh": 1
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "${DS_LOKI}"
            },
            "query": "label_values(namespace)",
            "definition": "label_values(namespace)",
            "label": "Namespace",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "refresh": 2,
            "sort": 0,
            "current": {
              "selected": true,
              "text": [
                "flux-system"
              ],
              "value": [
                "flux-system"
              ]
            }
          },
          {
            "name": "controller",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "${DS_LOKI}"
            },
            "query": "label_values({namespace=~\"$namespace\"}, pod)",
            "definition": "label_values({namespace=~\"$namespace\"}, pod)",
            "label": "Controller",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "refresh": 2,
            "sort": 0,
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            }
          },
          {
            "name": "level",
            "type": "custom",
            "label": "Level",
            "hide": 0,
            "includeAll": true,
            "multi": false,
            "allValue": "info|error|warning|debug",
            "query": "info,error,warning,debug",
            "options": [
              {
                "selected": true,
                "text": "All",
                "value": "$__all"
              },
              {
                "selected": false,
                "text": "info",
                "value": "info"
              },
              {
                "selected": false,
                "text": "error",
                "value": "error"
              },
              {
                "selected": false,
                "text": "warning",
                "value": "warning"
              },
              {
                "selected": false,
                "text": "debug",
                "value": "debug"
              }
            ],
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "query",
            "type": "textbox",
            "label": "Search",
            "hide": 0,
            "query": "",
            "current": {
              "selected": true,
              "text": "",
              "value": ""
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Flux Logs",
          "datasource": {
            "type": "loki",
            "uid": "${DS_LOKI}"
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${DS_LOKI}"
              },
              "expr": "{namespace=~\"$namespace\", pod=~\"$controller\"} | json | __error__!=\"JSONParserErr\" | level=~\"$level\" |= \"$query\"",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 30,
            "w": 24,
            "x": 0,
            "y": 1
          },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Log Volume",
          "datasource": {
            "type": "loki",
            "uid": "${DS_LOKI}"
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${DS_LOKI}"
              },
              "expr": "sum by (level) (count_over_time({namespace=~\"$namespace\", pod=~\"$controller\"} | json | __error__!=\"JSONParserErr\" | level=~\"$level\" |= \"$query\" [$__interval]))",
              "legendFormat": "{{level}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10
              }
            }
          }
        }
      ]
    }
