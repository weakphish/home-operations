apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    server:
      extraFlags:
        - web.enable-remote-write-receiver
      retention: 15d
      persistentVolume:
        enabled: true
        storageClass: longhorn
        size: 50Gi
      ingress:
        enabled: true
        ingressClassName: tailscale
        annotations:
          tailscale.com/hostname: prometheus
        hosts:
          - host: prometheus
        tls:
          - hosts: [prometheus]
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
    alertmanager:
      enabled: true
      persistence:
        enabled: false
      ingress:
        enabled: true
        ingressClassName: tailscale
        annotations:
          tailscale.com/hostname: alertmanager
        hosts:
          - host: alertmanager
        tls:
          - hosts: [alertmanager]
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    # k8s-monitoring/Alloy handles collection — disable duplicate scrapers
    kube-state-metrics:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    prometheus-pushgateway:
      enabled: false
