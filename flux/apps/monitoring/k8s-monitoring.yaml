apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: k8s-monitoring
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    cluster:
      name: new-bermuda
    destinations:
      - name: prometheus
        type: prometheus
        url: http://prometheus-server.default.svc.cluster.local/api/v1/write
      - name: loki
        type: loki
        url: http://loki.default.svc.cluster.local:3100
        tenantId: "default"
    clusterMetrics:
      enabled: true
    clusterEvents:
      enabled: true
    podLogs:
      enabled: true
    annotationAutodiscovery:
      enabled: true
    alloy-metrics:
      enabled: true
