apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    plugins:
      - cloudflare-app
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 10Gi
    initChownData:
      enabled: false
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: tailscale
      annotations:
        tailscale.com/hostname: grafana
      hosts: [grafana]
      tls:
        - hosts: [grafana]
    grafana.ini:
      server:
        root_url: https://grafana.pipefish-manta.ts.net
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-server.default.svc.cluster.local
            isDefault: true
            access: proxy
          - name: Loki
            type: loki
            url: http://loki.default.svc.cluster.local:3100
            access: proxy
    resources:
      requests:
        cpu: 20m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
