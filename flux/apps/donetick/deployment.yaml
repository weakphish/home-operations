apiVersion: apps/v1
kind: Deployment
metadata:
  name: donetick
  namespace: default
  labels:
    app: donetick
spec:
  replicas: 1
  selector:
    matchLabels:
      app: donetick
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: donetick
    spec:
      volumes:
        - name: donetick-data
          persistentVolumeClaim:
            claimName: donetick-data-claim
      containers:
        - name: donetick
          image: donetick/donetick:latest
          ports:
            - containerPort: 2021
          env:
            - { name: DT_ENV, value: selfhosted }
            - { name: DT_SQLITE_PATH, value: /donetick-data/donetick.db }
            - name: DT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: donetick-secret
                  key: jwtSecret
          volumeMounts:
            - { name: donetick-data, mountPath: /donetick-data }
          startupProbe:
            httpGet: { path: /, port: 2021 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 2021 }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /, port: 2021 }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
